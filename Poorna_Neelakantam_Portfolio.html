document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"9ce00506-17a9-40d3-be7c-20fbf256bb1a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ace57ef8-5784-42cf-b3a4-29ab642fc270\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8d1da02d-0935-4be5-9e4b-14af58cfe19f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --bg: #f6f5f1;\n    --paper: #ffffff;\n    --ink: #121418;\n    --ink-2: #35393f;\n    --muted: #6b707a;\n    --rule: #dcdad2;\n    --rule-2: #e8e6de;\n    --accent: #1f3a5f;\n    --accent-2: #c9502b;\n    --pos: #2e7d4f;\n    --warn: #b7791f;\n    --serif: 'Source Serif 4', Georgia, serif;\n    --sans: 'Inter', -apple-system, sans-serif;\n    --mono: 'IBM Plex Mono', monospace;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    background: var(--bg); color: var(--ink);\n    font-family: var(--sans); font-size: 14.5px; line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n  }\n  a { color: var(--accent); text-decoration: none; }\n  a:hover { text-decoration: underline; }\n  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }\n  ::selection { background: var(--accent); color: #fff; }\n\n  /* ===== report shell ===== */\n  .report {\n    max-width: 1280px; margin: 0 auto;\n    background: var(--paper);\n    border-left: 1px solid var(--rule); border-right: 1px solid var(--rule);\n    min-height: 100vh;\n  }\n\n  /* ===== top bar ===== */\n  .topbar {\n    display: flex; justify-content: space-between; align-items: center;\n    padding: 14px 32px;\n    border-bottom: 1px solid var(--rule);\n    font-family: var(--mono); font-size: 11.5px;\n    color: var(--muted); letter-spacing: .04em;\n  }\n  .topbar .brand {\n    font-family: var(--serif); font-size: 16px; color: var(--ink);\n    letter-spacing: -.01em;\n  }\n  .topbar .brand b { font-weight: 600; }\n  .topbar .pages { display: flex; gap: 20px; }\n  .topbar .pages a {\n    color: var(--muted); padding: 6px 10px; border-radius: 3px;\n    font-size: 11.5px; letter-spacing: .02em;\n    text-decoration: none;\n  }\n  .topbar .pages a:hover { color: var(--ink); background: var(--bg); }\n  .topbar .pages a.active { color: var(--ink); background: var(--bg); }\n  .topbar .now { display: flex; gap: 14px; align-items: center; }\n  .topbar .now .dot {\n    display: inline-block; width: 7px; height: 7px; border-radius: 99px;\n    background: var(--pos); margin-right: 6px;\n    animation: pulse 2s infinite;\n  }\n  @keyframes pulse { 50% { opacity: .4; } }\n\n  /* ===== header row ===== */\n  .header {\n    padding: 32px 32px 24px;\n    border-bottom: 1px solid var(--rule);\n    display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end;\n  }\n  .header h1 {\n    font-family: var(--serif);\n    font-weight: 500; font-size: 40px; line-height: 1.08;\n    margin: 0 0 8px; letter-spacing: -.015em;\n  }\n  .header .sub {\n    font-family: var(--mono); font-size: 12px; color: var(--muted);\n    letter-spacing: .06em; text-transform: uppercase;\n  }\n  .header .sub b { color: var(--ink); font-weight: 500; }\n  .header .meta {\n    font-family: var(--mono); font-size: 11px; color: var(--muted);\n    line-height: 1.8; text-align: right;\n  }\n  .header .meta b { color: var(--ink); font-weight: 500; }\n\n  /* ===== filter pane layout ===== */\n  .main {\n    display: grid; grid-template-columns: 220px 1fr;\n    min-height: 600px;\n  }\n  .filter {\n    border-right: 1px solid var(--rule);\n    padding: 24px 20px;\n    background: linear-gradient(to bottom, var(--bg), transparent 400px);\n  }\n  .filter h4 {\n    font-family: var(--mono); font-size: 10.5px;\n    letter-spacing: .1em; text-transform: uppercase;\n    color: var(--muted); margin: 0 0 10px;\n    padding-bottom: 8px; border-bottom: 1px solid var(--rule);\n  }\n  .filter .seg {\n    margin-bottom: 20px;\n  }\n  .filter .seg .opts {\n    display: flex; flex-direction: column; gap: 2px;\n  }\n  .filter .seg .opts button {\n    text-align: left; padding: 8px 10px;\n    font-family: var(--mono); font-size: 12px;\n    color: var(--muted);\n    border-radius: 3px;\n    transition: background .15s, color .15s;\n    display: flex; justify-content: space-between; align-items: center;\n  }\n  .filter .seg .opts button:hover { color: var(--ink); background: var(--rule-2); }\n  .filter .seg .opts button.on { color: var(--ink); background: var(--bg); }\n  .filter .seg .opts button.on::after {\n    content: '●'; color: var(--accent); font-size: 10px;\n  }\n  .filter .lgnd {\n    font-family: var(--mono); font-size: 11px; color: var(--muted);\n    margin-top: 4px; line-height: 1.5;\n  }\n  .filter .lgnd .sw {\n    display: inline-block; width: 8px; height: 8px; border-radius: 2px;\n    vertical-align: 1px; margin-right: 6px;\n  }\n\n  .canvas { padding: 28px 32px 48px; }\n\n  /* ===== KPI row ===== */\n  .kpis {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    gap: 0; border: 1px solid var(--rule);\n  }\n  .kpi {\n    p ont-size:15.5px;line-height:1.6;color:var(--ink-2);max-width:72ch\">\n            Data analyst with a Master's in Data Analytics and 2 years of industry experience in SQL,\n            Python, Tableau, and Power BI. Delivered automation that reduced annual storage costs by\n            <b style=\"color:var(--ink)\">$250K<\u002Fb>, improved query performance by <b style=\"color:var(--ink)\">35%<\u002Fb>,\n            and built an ML churn model (85.73% AUC-ROC) identifying <b style=\"color:var(--ink)\">$1.1M<\u002Fb> revenue\n            at risk. Recently completed M.S. Analytics (Dec 2025) and currently volunteering as a\n            Data Analyst at Chicago’s Doghouse Network — building Square payment data pipelines\n            and Tableau/Excel KPI dashboards for a local restaurant network. Authorized to work in the US.\n          <\u002Fdiv>\n          <div class=\"hm-only\" style=\"font-family:var(--serif);font-size:15.5px;line-height:1.6;color:var(--ink-2);max-width:72ch\">\n            I work at the seam between raw data and the decision someone is about to make with it.\n            At OpenText I wrote the stored procedure that automated <b>$250K/yr<\u002Fb> of storage review\n            and rewrote correlated subqueries into joins for a <b>35%<\u002Fb> perf lift across four enterprise\n            accounts. My thesis project (XGBoost churn classifier on 33K records) surfaced product\n            error rate — not support response time — as the #1 driver; that single finding flagged\n            <b>$1.1M MRR<\u002Fb>. I'm strongest in SQL &amp; modeling (Oracle PL/SQL, Postgres, CTEs, window\n            functions, star schemas), comfortable in Python (Pandas, Scikit-learn, XGBoost), and\n            fluent in Tableau (LOD) and Power BI (DAX). Sharpening dbt, Snowflake, and Airflow to\n            target AE/BIE roles specifically.\n          <\u002Fdiv>\n          <div class=\"peer-only\" style=\"font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--ink-2);max-width:72ch\">\n            <span style=\"color:var(--muted)\">-- tl;dr<\u002Fspan><br>\n            SELECT skills FROM me WHERE depth &gt; surface;<br><br>\n            Core: Oracle PL/SQL · Postgres · Pandas · Scikit-learn · XGBoost · Tableau LOD · DAX<br>\n            Building: dbt · Snowflake · Airflow · BigQuery (cert) · SQLMesh<br>\n            Opinion: product error rate beat support response as churn driver. Always check the\n            feature you <i>didn't<\u002Fi> expect.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- =========================================================== -->\n  <!-- ============ PAGE 2 — PROJECTS ============================ -->\n  <!-- =========================================================== -->\n  <div class=\"page\" data-panel=\"projects\">\n    <div style=\"padding: 24px 32px 12px;\">\n      <h2 style=\"font-family:var(--serif);font-weight:500;font-size:26px;margin:0 0 4px;letter-spacing:-.01em\">Projects · drill-through<\u002Fh2>\n      <div style=\"font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.02em\">Three shipped · additional exercises on GitHub<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:0 32px 20px\">\n      <table class=\"tbl\">\n        <thead>\n          <tr>\n            <th style=\"width:40%\">Project<\u002Fth>\n            <th>Stack<\u002Fth>\n            <th style=\"width:15%\">Headline metric<\u002Fth>\n            <th>Live<\u002Fth>\n            <th style=\"width:24px\"><\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr onclick=\"scrollToDrill('d1')\">\n            <td>\n              <div class=\"pname\">SaaS Customer Churn Analytics<\u002Fdiv>\n              <div class=\"stack\">SQL (CTE, window fn, RFM) · Python · XGBoost · Tableau<\u002Fdiv>\n            <\u002Ftd>\n            <td style=\"font-family:var(--mono);font-size:11.5px;color:var(--ink-2)\">5 relational tables · 33K records · 500 B2B accounts<\u002Ftd>\n            <td><div class=\"metric\">$1.1M<\u002Fdiv><div style=\"font-family:var(--mono);font-size:10.5px;color:var(--muted)\">MRR at risk<\u002Fdiv><\u002Ftd>\n            <td style=\"font-family:var(--mono);font-size:11px\"><a href=\"https://public.tableau.com/app/profile/poorna.venkat.neelakantam/vizzes\" target=\"_blank\">Tableau ↗<\u002Fa><\u002Ftd>\n            <td><span class=\"chev\">→<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr onclick=\"scrollToDrill('d2')\">\n            <td>\n              <div class=\"pname\">E-commerce Customer Analytics Pipeline<\u002Fdiv>\n              <div class=\"stack\">Python · Pandas · Scikit-learn · ETL<\u002Fdiv>\n            <\u002Ftd>\n            <td style=\"font-family:var(--mono);font-size:11.5px;color:var(--ink-2)\">5 heterogeneous sources unified · schema reconciliation · K-means<\u002Ftd>\n            <td><div class=\"metric\">99,441<\u002Fdiv><div style=\"font-family:var(--mono);font-size:10.5px;color:var(--muted)\">validated records<\u002Fdiv><\u002Ftd>\n            <td style=\"font-family:var(--mono);font-size:11px\"><a href=\"https://github.com/poornavenkatn08\" target=\"_blank\">GitHub ↗<\u002Fa><\u002Ftd>\n            <td><span class=\"chev\">→<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr onclick=\"scrollToDrill('d3')\">\n            <td>\n              <div class=\"pname\">FinTech Payments &amp; Healthcare KPI Dashboards<\u002Fdiv>\n              <div class=\"stack\">Tableau · Power BI · DAX · SQL · Power Query · Star Schema<\u002Fdiv>\n            <\u002Ftd>\n            <td style=\"font-family:var(--mono);font-size:11.5px;color:var(--ink-2)\">25+ DAX measures · 50+ calculated fields · drill-through<\u002Ftd>\n            <td><div class=\"metric\">$75.2M<\u002Fdiv><div style=\"font-family:var(--mono);font-size:10.5px;color:var(--muted)\">TPV analyzed<\u002Fdiv><\u002Ftd>\n            <td style=\"font-family:var(--mono);font- 02Fdd>\n          <\u002Fdl>\n        <\u002Fdiv>\n        <div class=\"right\">\n<span class=\"c\">-- per-account 7d error rate feature<\u002Fspan>\n<br><span class=\"kw\">WITH<\u002Fspan> events_7d <span class=\"kw\">AS<\u002Fspan> (\n<br>  <span class=\"kw\">SELECT<\u002Fspan>\n<br>    account_id,\n<br>    <span class=\"kw\">COUNT<\u002Fspan>(*)                                      <span class=\"kw\">AS<\u002Fspan> total_events,\n<br>    <span class=\"kw\">SUM<\u002Fspan>(<span class=\"kw\">CASE WHEN<\u002Fspan> error_flag <span class=\"kw\">THEN<\u002Fspan> 1 <span class=\"kw\">ELSE<\u002Fspan> 0 <span class=\"kw\">END<\u002Fspan>) <span class=\"kw\">AS<\u002Fspan> errors,\n<br>    <span class=\"kw\">DATE_TRUNC<\u002Fspan>(<span class=\"str\">'week'<\u002Fspan>, ts) <span class=\"kw\">AS<\u002Fspan> wk\n<br>  <span class=\"kw\">FROM<\u002Fspan> product_events\n<br>  <span class=\"kw\">WHERE<\u002Fspan> ts &gt;= <span class=\"kw\">CURRENT_DATE<\u002Fspan> - <span class=\"kw\">INTERVAL<\u002Fspan> <span class=\"str\">'90 days'<\u002Fspan>\n<br>  <span class=\"kw\">GROUP BY<\u002Fspan> account_id, <span class=\"kw\">DATE_TRUNC<\u002Fspan>(<span class=\"str\">'week'<\u002Fspan>, ts)\n<br>)\n<br><span class=\"kw\">SELECT<\u002Fspan>\n<br>  account_id, wk,\n<br>  errors * 1.0 / <span class=\"kw\">NULLIF<\u002Fspan>(total_events, 0) <span class=\"kw\">AS<\u002Fspan> err_rate_7d,\n<br>  <span class=\"kw\">NTILE<\u002Fspan>(4) <span class=\"kw\">OVER<\u002Fspan> (<span class=\"kw\">PARTITION BY<\u002Fspan> wk <span class=\"kw\">ORDER BY<\u002Fspan> errors) <span class=\"kw\">AS<\u002Fspan> err_quartile\n<br><span class=\"kw\">FROM<\u002Fspan> events_7d;\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DRILL 2 — ETL -->\n    <div style=\"padding:0 32px\" id=\"d2\">\n      <h3 style=\"font-family:var(--serif);font-weight:500;font-size:20px;margin:28px 0 8px\">Project 02 · Drill-through<\u002Fh3>\n    <\u002Fdiv>\n    <div style=\"padding:0 32px\">\n t from\n          Poorna's resume and portfolio — so expect factual, concise replies.\n        <\u002Fdiv>\n        <div class=\"input-row\">\n          <input id=\"amaInput\" placeholder=\"e.g. Is he authorized to work in the US? What's his strongest SQL experience?\">\n          <button class=\"go\" id=\"amaGo\">Ask<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"suggest\" id=\"amaSuggest\">\n          <button>Is he US work-authorized?<\u002Fbutton>\n          <button>Walk me through the churn project.<\u002Fbutton>\n          <button>Strongest SQL experience?<\u002Fbutton>\n          <button>Experience with dbt or Snowflake?<\u002Fbutton>\n          <button>Tell me about the career gap.<\u002Fbutton>\n          <button>What roles are you targeting?<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"ans\" id=\"amaAns\"><\u002Fdiv>\n        <div style=\"font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:14px;letter-spacing:.02em\">\n          Powered by an LLM constrained to the résumé facts below. Not a substitute for a phone screen.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== footer contact ===== -->\n  <div class=\"foot\">\n    <div>\n      <h2>Let's move forward.<\u002Fh2>\n      <div style=\"font-family:var(--mono);font-size:12px;color:var(--muted);max-width:48ch;line-height:1.6\">\n        Actively interviewing for <b style=\"color:var(--ink)\">Analytics Engineer<\u002Fb>, <b style=\"color:var(--ink)\">BI Engineer<\u002Fb>, and\n        <b style=\"color:var(--ink)\">Data Analyst<\u002Fb> roles. Chicago, IL · open to remote / hybrid.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lnks\">\n      <a href=\"mailto:pvneelakantam@gmail.com\">pvneelakantam@gmail.com →<\u002Fa>\n      <a href=\"tel:+12249466686\">+1 · 224 · 946 · 6686 →<\u002Fa>\n      <a href=\"https://linkedin.com/in/pneelakantam\" target=\"_blank\">linkedin.com/in/pneelakantam →<\u002Fa>\n      <a href=\"https://github.com/poornavenkatn08\" target=\"_blank\">github.com/poornavenkatn08 →<\u002Fa>\n      <a href=\"https://public.tableau.com/app/profile/poorna.venkat.neelakantam/vizzes\" target=\"_blank\">Tableau Public profile →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"coda\">\n    <span>© 2026 · Poorna Venkat Neelakantam · Prepared for recruiter review<\u002Fspan>\n    <span>Refreshed · <span id=\"coda-ts\"><\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n/* ============ state ============ */\nconst pages = document.querySelectorAll('[data-panel]');\nconst pageLinks = document.querySelectorAll('#pages a');\npageLinks.forEach(a => a.addEventListener('click', e => {\n  e.preventDefault();\n  pageLinks.forEach(x => x.classList.remove('active'));\n  a.classList.add('active');\n  const p = a.dataset.page;\n  pages.forEach(pn => pn.classList.toggle('on', pn.dataset.panel === p));\n  window.scrollTo({top:0, behavior:'smooth'});\n}));\n\n/* view-mode swap */\nconst viewBtns = document.querySelectorAll('#viewOpts button');\nviewBtns.forEach(b => b.addEventListener('click', () => {\n  viewBtns.forEach(x => x.classList.remove('on'));\n  b.classList.add('on');\n  document.getElementById('report').dataset.view = b.dataset.v;\n  document.getElementById('modeLabel').textContent = b.textContent.trim().split('\\n')[0];\n}));\n\n/* timestamp */\nconst now = new Date();\ndocument.getElementById('today').textContent = now.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});\ndocument.getElementById('ts').textContent = now.toLocaleString('en-US', {dateStyle:'medium', timeStyle:'short'});\ndocument.getElementById('coda-ts').textContent = now.toLocaleDateString();\n\n/* ============ timeline bars ============ */\nconst YEARS_START = 2018, YEARS_END = 2026;\nfunction pctForDate(y, m=0) {\n  const t = (y - YEARS_START) + (m / 12);\n  const total = (YEARS_END - YEARS_START) + 1;\n  return (t / total) * 100;\n}\nconst bars = [\n  { lbl: 'Rapturize (Intern)',      cls: 'early', s: [2018, 11], e: [2019, 1] },\n  { lbl: 'Signer Tech (Intern)',    cls: 'early', s: [2019, 4],  e: [2019, 11] },\n  { lbl: 'Inception Wave',          cls: 'early', s: [2020, 0],  e: [2020, 5] },\n  { lbl: 'SRM · B.S. CS',           cls: 'edu',   s: [2018, 6],  e: [2021, 5] },\n  { lbl: 'SRM · Chairman',          cls: 'vol',   s: [2019, 7],  e: [2021, 4] },\n  { lbl: 'OpenText · Intern',       cls: 'work',  s: [2021, 4],  e: [2021, 10] },\n  { lbl: 'OpenText · Analyst',      cls: 'work',  s: [2021, 10], e: [2022, 4] },\n  { lbl: 'IIT · M.S. CS',           cls: 'edu',   s: [2022, 7],  e: [2023, 11] },\n  { lbl: 'IWU · M.S. Analytics',    cls: 'edu',   s: [2024, 0],  e: [2025, 11] },\n  { lbl: 'Skills development',      cls: 'dev',   s: [2022, 5],  e: [2026, 3] },\n  { lbl: 'Doghouse Network · vol',  cls: 'vol',   s: [2026, 3],  e: [2026, 11] },\n];\nconst tracks = document.getElementById('tracks');\nbars.forEach(b => {\n  const row = document.createElement('div');\n  row.className = 'track';\n  row.innerHTML = `<div class=\"lbl\">${b.lbl}<\u002Fdiv><div class=\"bar-track\"><\u002Fdiv>`;\n  tracks.appendChild(row);\n  const bt = row.querySelector('.bar-track');\n  const sPct = pctForDate(b.s[0], b.s[1]);\n  const ePct = pctForDate(b.e[0], b.e[1]);\n  const bar = document.createElement('div');\n  bar.className = 'bar ' + b.cls;\n  bar.style.left = sPct + '%';\n  bar.style.width = Math.max(2, ePct - sPct) + '%';\n  bar.title = `${b.lbl} · ${b.s[0]} – ${b.e[0]}`;\n  bar.textContent = b.lbl.length > 22 ? '' : b.lbl;\n  bt.appendChild(bar);\n});\n\n/* ============ skill bars ============ */\nconst skills = [\n  ['SQL',       'Oracle PL/SQL · Postgres · MySQL · CTE · window fn', .97, '5+ yrs'],\n  ['Python',    'Pandas · NumPy · Scikit-learn · XGBoost', .88, '4 yrs'],\n  ['Tableau',   'LOD · calculated fields · published', .92, '3 yrs'],\n  ['Power BI',  'DAX · Power Query · star schema · Excel', .85, '2 yrs'],\n  ['BigQuery',  'GCP · certified', .78, 'Cert'],\n  ['ETL',       'Kafka · log parsing · pipelines', .80, '3 yrs'],\n  ['dbt',       'Models · tests · docs · sharpening', .55, 'Building'],\n  ['Snowflake', 'Warehouse SQL · sharpening', .50, 'Building'],\n];\nconst skillsEl = document.getElementById('skills');\nskills.forEach(([nm, det, v, n]) => {\n  const row = document.createElement('div');\n  row.className = 'skill';\n  row.innerHTML = `<div class=\"nm\">${nm}<\u002Fdiv><div class=\"b\" style=\"--v:0\"><\u002Fdiv><div class=\"n\">${n}<\u002Fdiv><div class=\"detail\">${det}<\u002Fdiv>`;\n  skillsEl.appendChild(row);\n  const obs = new IntersectionObserver(([e]) => {\n    if (e.isIntersecting) { row.querySelector('.b').style.setProperty('--v', v); obs.disconnect(); }\n  }, {threshold: .3});\n  obs.observe(row);\n});\n\n/* ============ animated counters ============ */\nfunction animateCounters() {\n  document.querySelectorAll('.kpi .v[data-count]').forEach(el => {\n    if (el.dataset.done) return;\n    const target = parseFloat(el.dataset.count);\n    const prefix = el.dataset.prefix || '';\n    const suffix = el.dataset.suffix || '';\n    const decimals = +el.dataset.decimals || 0;\n    const unitSpan = el.querySelector('.u');\n    const dur = 1400;\n    const start = performance.now();\n    function tick(now) {\n      const p = Math.min(1, (now - start) / dur);\n      const v = target * (1 - Math.pow(1-p, 3));\n      const txt = prefix + v.toFixed(decimals) + suffix;\n      if (el.firstChild.nodeType === 3) el.firstChild.nodeValue = txt;\n      else el.insertBefore(document.createTextNode(txt), el.firstChild);\n      if (p < 1) requestAnimationFrame(tick);\n      else el.dataset.done = '1';\n    }\n    requestAnimationFrame(tick);\n  });\n}\nsetTimeout(animateCounters, 400);\n\n/* ============ drill scroll ============ */\nfunction scrollToDrill(id) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  el.scrollIntoView({behavior:'smooth', block:'start'});\n}\nwindow.scrollToDrill = scrollToDrill;\n\n/* ============ AMA ============ */\nconst FACTS = `\nNAME: Poorna Venkat Neelakantam\nLOCATION: Chicago, IL\nWORK AUTH: US work-authorized\nTARGETS: Analytics Engineer, BI Engineer, Data Analyst\nCONTACT: pvneelakantam@gmail.com, 224-946-6686\nLINKS: github.com/poornavenkatn08, linkedin.com/in/pneelakantam, Tableau Public profile /poorna.venkat.neelakantam\n\nEDUCATION:\n- M.S. Management, Data Analytics spec., Indiana Wesleyan, Dec 2025\n- Previously M.S. CS, Illinois Institute of Technology, Aug 2022–Dec 2023 (realigned to analytics)\n- B.S. CS, SRM University, India, Jun 2021\n\nEXPERIENCE:\n- Nov 2021–May 2022: OpenText, Data Analyst / Associate Engineer\n  * PL/SQL retention automation reducing storage costs by $250K/yr\n  * Improved query performance 35% across 4 enterprise accounts (composite indexes, join rewrites)\n  * Reduced API call volume 60% via request batching (100 orders/batch)\n- May 2021–Nov 2021: OpenText, Data Analytics Intern (Kafka)\n  * KPI dashboards on 10K+ daily Kafka messages\n  * Python regex log parser for timeout/connection/null-pointer errors\n  * Migration docs used by 50+ engineers; Kafka migration 3x throughput over ActiveMQ\n- Apr 2026–ongoing: Volunteer Data Analyst, Chicago’s Doghouse Network (restaurant network). Building Square payment data pipelines with AI-assisted development (Claude, Codex); Tableau and Excel dashboards for sales/KPIs; Python + SQL exploratory analysis on customer and transaction data.\n- Jan–Jun 2020: Inception Wave, Founding Data Analyst Intern — market research, 200+ customer analysis\n- 2019: Signer Tech — Django pipeline, +30% SQL efficiency\n- 2018–2019: Rapturize — TF/Keras image classifier, 85%+ accuracy\n\nPROJECTS:\n- SaaS Churn Analytics: XGBoost churn model, 500 B2B accounts, 33K records, 5 tables.\n  AUC-ROC 0.8573, precision 92.31%. Identified $1.1M MRR at risk. Discovered product error rate\n  was #1 driver (contradicted support-response-time hypothesis). Published 4-page Tableau dashboard.\n- E-commerce Customer Analytics Pipeline: Python/Pandas ETL unifying 5 sources into 99,441\n  validated records, K-means segmentation.\n- FinTech/Healthcare KPI Dashboards: Tableau + Power BI, 25+ DAX measures, 50+ calculated fields,\n  500K+ transactions ($75.2M TPV), 10K+ healthcare records, star schema.\n\nSKILLS:\n- SQL (strongest): Oracle PL/SQL, Postgres, MySQL, CTEs, window functions (NTILE), stored procs, query optimization\n- Python: Pandas, NumPy, Scikit-learn, XGBoost, Random Forest, K-means, regex, feature engineering\n- Viz: Tableau (LOD, published), Power BI (DAX, Power Query, star schema)\n- Cloud/Platforms: GCP BigQuery certified, Kafka, Django, Git, JIRA, Agile\n- Currently sharpening: dbt, Snowflake, Airflow\n\nCAREER GAP: From May 2022 to now, Poorna pivoted from IIT M.S. CS to Indiana Wesleyan M.S. Analytics\n(a deliberate realignment), finished coursework, developed dbt/Snowflake/Airflow skills,\nbuilt the three portfolio projects, and started volunteer analytics work at Chicago’s Doghouse Network (April 2026).\n\nLEADERSHIP: Chairman, SRM University Tech Festival 2019–2021. Led 30+ volunteers, 5,000+ attendees,\n$15K sponsorship secured.\n`;\n\nasync function askAMA(q) {\n  const ans = document.getElementById('amaAns');\n  ans.textContent = '';\n  ans.classList.add('loading');\n  try {\n    const sys = `You are an assistant answering recruiter and hiring-manager questions about Poorna Venkat Neelakantam. ONLY use the facts below — if the answer is not in the facts, say so briefly and suggest contacting him directly. Be concise, factual, professional. Keep answers under 120 words. Do not embellish. Do not invent skills or projects. Use third person.\n\nFACTS:\n${FACTS}`;\n    const response = await window.claude.complete({\n      messages: [\n        { role: 'user', content: sys + '\\n\\nRECRUITER QUESTION: ' + q }\n      ]\n    });\n    ans.classList.remove('loading');\n    ans.textContent = response;\n  } catch (e) {\n    ans.classList.remove('loading');\n    ans.textContent = 'Couldn\\'t reach the model. Please email pvneelakantam@gmail.com directly — he\\'ll answer within a day.';\n  }\n}\n\ndocument.getElementById('amaGo').addEventListener('click', () => {\n  const q = document.getElementById('amaInput').value.trim();\n  if (q) askAMA(q);\n});\ndocument.getElementById('amaInput').addEventListener('keydown', e => {\n  if (e.key === 'Enter') {\n    const q = e.target.value.trim();\n    if (q) askAMA(q);\n  }\n});\ndocument.querySelectorAll('#amaSuggest button').forEach(b => b.addEventListener('click', () => {\n  document.getElementById('amaInput').value = b.textContent;\n  askAMA(b.textContent);\n}));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
